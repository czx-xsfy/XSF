<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">

  <link rel="stylesheet" href="style.css">

<body>
  <div class="container">    <p><a href="index.html">返回索引</a></p>
    <h1>XSF_Event</h1>
    <pre>struct XSF_Event { XSF_EventType type; XSF_Key key; XSF_MouseButton mouse; int mousex; int mousey; MSG msg; HWND hwnd; };</pre>
    <h2>字段说明</h2>
    <ul>
      <li><strong>type</strong>：事件类型（枚举）。</li>
      <li><strong>key</strong>：键盘按键（枚举）。</li>
      <li><strong>mouse</strong>：鼠标按键（枚举）。</li>
      <li><strong>mousex, mousey</strong>：鼠标坐标。</li>
      <li><strong>msg</strong>：Win32 MSG 原始消息结构。</li>
      <li><strong>hwnd</strong>：发送该事件的窗口句柄。</li>
    </ul>
  </div>
</body>
</html>
