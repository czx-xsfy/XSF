  <div class="container">    <p><a href="index.html">返回索引</a></p>
    <h1>XSF_Image</h1>
    <pre>struct XSF_Image { IWICBitmap* Bitmap; float width; float height; };</pre>
    <h2>字段说明</h2>
    <ul>
      <li><strong>Bitmap</strong>：IWICBitmap*，WIC 位图资源句柄。</li>
      <li><strong>width, height</strong>：图像宽高（像素）。</li>
    </ul>
    <p>使用 XSF_LoadImage 加载；使用 XSF_UnLoadImage 释放。</p>
